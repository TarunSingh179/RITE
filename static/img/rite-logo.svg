<?xml version="1.0" encoding="UTF-8"?>
<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RITE Logo</title>
  <desc id="desc">Simple placeholder logo for RITE College branding</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#0b5ed7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect x="12" y="12" width="136" height="136" rx="28" fill="url(#g)" filter="url(#shadow)"/>
  <g fill="#fff" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="80" y="86" font-size="44" font-weight="700" letter-spacing="2">RITE</text>
  </g>
</svg>
