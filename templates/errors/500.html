{% extends "base.html" %}

{% block title %}Server Error - College Management System{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow">
                <div class="card-body">
                    <i class="fas fa-exclamation-circle text-danger" style="font-size: 4rem;"></i>
                    <h1 class="display-1 text-muted">500</h1>
                    <h2 class="mb-4">Internal Server Error</h2>
                    <p class="text-muted mb-4">Something went wrong on our end. We're working to fix the problem. Please try again later.</p>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="{{ url_for('index') }}" class="btn btn-primary">
                            <i class="fas fa-home me-2"></i>Go to Homepage
                        </a>
                        <button onclick="location.reload()" class="btn btn-outline-secondary">
                            <i class="fas fa-redo me-2"></i>Try Again
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
