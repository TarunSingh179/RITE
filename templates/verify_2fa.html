{% extends 'base.html' %}
{% block title %}Admin 2FA Verification{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Two-Factor Authentication</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="code" class="form-label">Enter the 6-digit code sent to your email:</label>
                            <input type="text" class="form-control" id="code" name="code" maxlength="6" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Verify &amp; Login</button>
                    </form>
                    <hr>
                    <p class="text-muted small mb-0">Didn't receive the code? Check your spam folder or <a href="{{ url_for('login') }}">try logging in again</a>.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
