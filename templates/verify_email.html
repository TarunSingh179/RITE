{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Email Verification</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="otp">Enter OTP sent to your email</label>
                            <input type="text" class="form-control" id="otp" name="otp" required maxlength="6" pattern="[0-9]+" title="Please enter 6 digits">
                            <small class="form-text text-muted">Please check your email for the verification code</small>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block mt-3">Verify Email</button>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small>OTP will expire in 10 minutes</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
