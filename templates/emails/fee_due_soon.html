<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; color:#222">
    <h2>Fee Due Soon</h2>
    <p>Dear {{ student.get_full_name() }},</p>
    <p>Your fee is due soon:</p>
    <ul>
      <li>Fee: <strong>{{ fee.fee_type }}</strong></li>
      <li>Amount: <strong>{{ '%.2f'|format(fee.amount) }}</strong></li>
      <li>Due Date: <strong>{{ fee.due_date }}</strong></li>
    </ul>
    <p>Please ensure timely payment to avoid late fees.</p>
  </body>
</html>
